name: Weather Analytics CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-package: jdk
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Run Analytics
      run: mvn -B test
      env:
        API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}